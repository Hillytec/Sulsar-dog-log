<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>K9 Field Log</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B263B">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="K9 Log">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#FF6B00;
  --primary-dim:#7A3A12;
  --secondary:#1B263B;
  --secondary-light:#25334C;
  --secondary-lighter:#324562;
  --tertiary:#FFD60A;
  --neutral:#E0E1DD;
  --neutral-dim:#8D93A6;
  --line: rgba(224,225,221,0.12);
  --danger:#E5484D;
  --success:#3FBF7F;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#10182A;}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--neutral);}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--secondary);display:flex;flex-direction:column;position:relative;}
.header{position:sticky;top:0;z-index:20;background:var(--secondary);padding:14px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-title{font-weight:800;font-size:15px;letter-spacing:0.06em;text-transform:uppercase;line-height:1.1;}
.brand-title span{display:block;font-size:10px;font-weight:500;color:var(--neutral-dim);letter-spacing:0.08em;}
.role-toggle{display:flex;background:var(--secondary-lighter);border-radius:999px;padding:3px;}
.role-toggle button{border:none;background:transparent;color:var(--neutral-dim);font-family:inherit;font-size:12px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;}
.role-toggle button.active{background:var(--primary);color:#fff;}
.main{flex:1;padding:16px 16px 100px;overflow-y:auto;}
.card{background:var(--secondary-light);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--tertiary);margin:0 0 8px;}
h1.page-title{font-size:20px;font-weight:700;margin:2px 0 16px;}
label{display:block;font-size:12px;color:var(--neutral-dim);margin-bottom:5px;font-weight:500;}
input[type=text],input[type=date],input[type=number],select,textarea{
  width:100%;background:var(--secondary);border:1px solid var(--line);border-radius:10px;color:var(--neutral);
  padding:10px 11px;font-size:15px;font-family:inherit;margin-bottom:12px;
}
textarea{resize:vertical;min-height:64px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);}
.field{position:relative;}
.mic-row{display:flex;align-items:flex-start;gap:8px;}
.mic-row textarea{flex:1;}
.mic-btn{flex:none;width:38px;height:38px;border-radius:50%;border:2px solid var(--tertiary);background:var(--secondary);
  color:var(--tertiary);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;}
.mic-btn.rec{background:var(--tertiary);color:var(--secondary);animation:pulse 1.1s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,214,10,0.5);}70%{box-shadow:0 0 0 9px rgba(255,214,10,0);}100%{box-shadow:0 0 0 0 rgba(255,214,10,0);}}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.seg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.seg button{flex:1;min-width:70px;border:1px solid var(--line);background:var(--secondary);color:var(--neutral-dim);
  font-family:inherit;font-size:13px;font-weight:600;padding:9px 6px;border-radius:9px;cursor:pointer;}
.seg button.active{background:var(--primary);border-color:var(--primary);color:#fff;}
details.section{background:var(--secondary-light);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;}
details.section summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  font-weight:700;font-size:13px;letter-spacing:0.03em;border-left:4px solid var(--tertiary);}
details.section summary::-webkit-details-marker{display:none;}
details.section summary .chev{transition:transform .15s;color:var(--neutral-dim);}
details.section[open] summary .chev{transform:rotate(180deg);}
details.section .section-body{padding:4px 16px 16px;}
.btn{font-family:inherit;font-size:15px;font-weight:700;border-radius:11px;padding:13px 16px;border:none;cursor:pointer;width:100%;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-secondary{background:transparent;border:1.5px solid var(--neutral-dim);color:var(--neutral);}
.btn-danger{background:transparent;border:1.5px solid var(--danger);color:var(--danger);}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{width:auto;flex:1;}
.bottom-nav{position:sticky;bottom:0;background:var(--secondary-light);border-top:1px solid var(--line);
  display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:20;}
.bottom-nav button{flex:1;background:none;border:none;color:var(--neutral-dim);font-family:inherit;display:flex;
  flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:6px 0;cursor:pointer;}
.bottom-nav button.active{color:var(--primary);}
.log-card{background:var(--secondary-light);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.log-card:active{border-color:var(--primary);}
.log-main{flex:1;min-width:0;}
.log-date{font-size:13px;color:var(--neutral-dim);font-weight:600;}
.log-obj{font-size:14px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.badge{font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:4px 9px;border-radius:999px;flex:none;margin-left:8px;}
.badge.draft{background:var(--tertiary);color:#2b2400;}
.badge.submitted{background:var(--primary);color:#fff;}
.badge.signed{background:var(--success);color:#08301c;}
.empty{text-align:center;padding:50px 20px;color:var(--neutral-dim);}
.empty svg{margin-bottom:12px;opacity:0.6;}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.thumb{position:relative;width:78px;height:78px;border-radius:9px;overflow:hidden;border:1px solid var(--line);}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.55);border:none;color:#fff;width:20px;height:20px;
  border-radius:50%;font-size:12px;line-height:1;cursor:pointer;}
.upload-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--neutral-dim);
  border-radius:11px;padding:14px;color:var(--neutral-dim);font-size:13px;font-weight:600;cursor:pointer;}
.upload-btn input{display:none;}
#gpxMap,#gpxMapView{width:100%;height:200px;border-radius:12px;margin-top:8px;background:var(--secondary);}
.compass-wrap{display:flex;align-items:center;gap:14px;margin-top:6px;}
.compass-legend{font-size:12px;color:var(--neutral-dim);flex:1;}
.compass-legend div{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.dot{width:9px;height:9px;border-radius:50%;flex:none;}
.weather-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.wstat{background:var(--secondary);border-radius:10px;padding:9px 11px;}
.wstat .v{font-size:17px;font-weight:700;}
.wstat .l{font-size:10px;color:var(--neutral-dim);text-transform:uppercase;letter-spacing:0.05em;}
.readonly-field{background:var(--secondary);border-radius:10px;padding:10px 11px;margin-bottom:10px;font-size:14px;white-space:pre-wrap;}
.readonly-label{font-size:11px;color:var(--neutral-dim);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:4px;}
.top-back{display:flex;align-items:center;gap:8px;color:var(--neutral-dim);font-size:13px;font-weight:600;margin-bottom:14px;cursor:pointer;}
#sigCanvas{width:100%;height:130px;background:var(--secondary);border:1px solid var(--line);border-radius:10px;touch-action:none;}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;}
.check-row input{width:auto;margin:0;}
.notice{background:rgba(255,214,10,0.1);border:1px solid rgba(255,214,10,0.3);color:var(--tertiary);font-size:12px;
  padding:9px 11px;border-radius:9px;margin-bottom:14px;line-height:1.4;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
<script>
(function(){

var state = { role:'handler', screen:'home', draft:null, index:[], recognizingField:null, recognition:null };

function uid(p){ return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

async function storeGet(key){
  try{ var r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function storeSet(key,val){
  try{ await window.storage.set(key, JSON.stringify(val), true); return true; }
  catch(e){ console.error('storage error',e); return false; }
}
async function storeDelete(key){ try{ await window.storage.delete(key, true); }catch(e){} }

var DB_NAME='k9fieldlog', DB_VERSION=1, STORE='logs', _dbp=null;
function openDB(){
  if(_dbp) return _dbp;
  _dbp = new Promise(function(resolve,reject){
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e){
      var db = e.target.result;
      if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE,{keyPath:'id'});
    };
    req.onsuccess = function(){ resolve(req.result); };
    req.onerror = function(){ reject(req.error); };
  });
  return _dbp;
}
function dbGetAll(){
  return openDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx = db.transaction(STORE,'readonly');
      var req = tx.objectStore(STORE).getAll();
      req.onsuccess=function(){ resolve(req.result||[]); };
      req.onerror=function(){ reject(req.error); };
    });
  });
}
function dbGet(id){
  return openDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx = db.transaction(STORE,'readonly');
      var req = tx.objectStore(STORE).get(id);
      req.onsuccess=function(){ resolve(req.result||null); };
      req.onerror=function(){ reject(req.error); };
    });
  });
}
function dbPut(log){
  return openDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx = db.transaction(STORE,'readwrite');
      tx.objectStore(STORE).put(log);
      tx.oncomplete=function(){ resolve(true); };
      tx.onerror=function(){ reject(tx.error); };
    });
  });
}
function dbDelete(id){
  return openDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx = db.transaction(STORE,'readwrite');
      tx.objectStore(STORE).delete(id);
      tx.oncomplete=function(){ resolve(true); };
      tx.onerror=function(){ reject(tx.error); };
    });
  });
}

async function loadIndex(){
  var all = await dbGetAll();
  state.index = all.map(function(l){
    return {id:l.id,date:l.date,dog:l.dog,handler:l.handler,objective:(l.trainingObjective||'').slice(0,70),status:l.status};
  }).sort(function(a,b){ return (b.date||'').localeCompare(a.date||'') || b.id.localeCompare(a.id); });
}
async function saveLog(log){ await dbPut(log); await loadIndex(); }
async function loadLog(id){ return await dbGet(id); }
async function removeLog(id){ await dbDelete(id); await loadIndex(); }

function exportLog(log){
  var blob = new Blob([JSON.stringify(log,null,2)], {type:'application/json'});
  var filename = 'k9log-'+(log.dog||'dog')+'-'+log.date+'-'+log.id.slice(-6)+'.json';
  if(navigator.canShare && navigator.canShare({files:[new File([blob],filename,{type:'application/json'})]})){
    var file = new File([blob], filename, {type:'application/json'});
    navigator.share({files:[file], title:filename}).catch(function(){ downloadBlob(blob, filename); });
  } else {
    downloadBlob(blob, filename);
  }
}
function downloadBlob(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}
function importLogFile(file){
  var reader = new FileReader();
  reader.onload = async function(){
    try{
      var log = JSON.parse(reader.result);
      if(!log.id || !log.date){ alert('That file does not look like a K9 Field Log export.'); return; }
      await saveLog(log);
      state.draft = log;
      state.screen = (state.role==='handler' && log.status==='draft') ? 'edit' : 'view';
      render();
    }catch(e){ alert('Could not read that file. Make sure it is a log exported from this app.'); }
  };
  reader.readAsText(file);
}

function newLog(){
  return {
    id: uid('log'), status:'draft', type:'individual',
    handler:'Dave Hill', dog:'Barney', date:new Date().toISOString().slice(0,10), timeOfDay:'AM',
    location:'', trainingObjective:'',
    numSubjects:'', trailSize:'', trailAge:'', numTurns:'',
    scentArticle:'', scentArticleType:'na', timeOnTrail:'',
    scentSpecific:'na', trailYes:'na', directionConfirmed:'na', fieldTech:'',
    weather:{ indoors:false, temperature:'', humidityLevel:'med', windSpeed:'', windDirDeg:null,
      conditions:'', lat:null, lon:null, sunAzimuthDeg:null, fetchedAt:null, manualNote:'' },
    environmentConditions:'',
    trainerComments:'', handlerComments:'', goingForward:'',
    reward:'', ftr:'',
    photos:[], gpx:null,
    objectivesMet:'', anyOtherComments:'',
    trainerSignoff:null
  };
}

/* ---------- icons ---------- */
function icon(name, size){
  size = size||20;
  var p = {
    paw:'<path d="M7 12c1.4 0 2.5-1.5 2.5-3.2S8.4 5.6 7 5.6 4.5 7.1 4.5 8.8 5.6 12 7 12zm10 0c1.4 0 2.5-1.5 2.5-3.2S18.4 5.6 17 5.6 14.5 7.1 14.5 8.8 15.6 12 17 12zM10 10c1.1 0 2-1.3 2-2.9S11.1 4.2 10 4.2 8 5.5 8 7.1 8.9 10 10 10zm4 0c1.1 0 2-1.3 2-2.9S15.1 4.2 14 4.2s-2 1.3-2 2.9.9 2.9 2 2.9zM12 12.8c-3 0-6.2 2.6-6.2 5.4 0 1.6 1.3 2.6 2.9 2.6 1.2 0 2-.5 3.3-.5s2.1.5 3.3.5c1.6 0 2.9-1 2.9-2.6 0-2.8-3.2-5.4-6.2-5.4z"/>',
    list:'<path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>',
    plus:'<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" fill="none"/>',
    check:'<path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
    chev:'<path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
    back:'<path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
    mic:'<path d="M12 14a3 3 0 003-3V6a3 3 0 00-6 0v5a3 3 0 003 3z" fill="currentColor"/><path d="M6 11a6 6 0 0012 0M12 17v3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>',
    camera:'<path d="M4 8h3l1.5-2h7L17 8h3v11H4z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/><circle cx="12" cy="13.5" r="3.2" stroke="currentColor" stroke-width="1.8" fill="none"/>',
    trash:'<path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>',
    location:'<path d="M12 21s7-6.6 7-11.5A7 7 0 105 9.5C5 14.4 12 21 12 21z" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="12" cy="9.5" r="2.3" fill="currentColor"/>',
    dog:'<path d="M4 12c0-3 2-5 5-5h1l2-2 2 2h1c3 0 5 2 5 5v3a5 5 0 01-5 5H9a5 5 0 01-5-5v-3z" stroke="currentColor" stroke-width="1.6" fill="none"/>',
    x:'<path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>'
  };
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none">'+p[name]+'</svg>';
}

/* ---------- weather / sun ---------- */
function wmoText(code){
  var m = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Fog',
    51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',
    71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Rain showers',82:'Violent showers',
    95:'Thunderstorm'};
  return m[code] || 'Overcast';
}
function compassPoint(deg){
  var dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(((deg%360)/22.5))%16];
}
async function fetchWeather(){
  if(!navigator.geolocation){ alert('Location services are not available on this device. Enter weather manually below.'); return; }
  navigator.geolocation.getCurrentPosition(async function(pos){
    var lat=pos.coords.latitude, lon=pos.coords.longitude;
    state.draft.weather.lat=lat; state.draft.weather.lon=lon;
    try{
      var res = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
        '&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code&wind_speed_unit=mph&timezone=auto');
      var data = await res.json();
      var c = data.current;
      state.draft.weather.temperature = Math.round(c.temperature_2m);
      state.draft.weather.humidityPct = Math.round(c.relative_humidity_2m);
      state.draft.weather.humidityLevel = c.relative_humidity_2m>70?'high':(c.relative_humidity_2m>40?'med':'low');
      state.draft.weather.windSpeed = Math.round(c.wind_speed_10m);
      state.draft.weather.windDirDeg = Math.round(c.wind_direction_10m);
      state.draft.weather.conditions = wmoText(c.weather_code);
      state.draft.weather.fetchedAt = new Date().toISOString();
    }catch(e){ alert('Could not reach the weather service. Check your connection or enter values manually.'); }
    if(window.SunCalc){
      var sp = SunCalc.getPosition(new Date(), lat, lon);
      state.draft.weather.sunAzimuthDeg = Math.round(((sp.azimuth*180/Math.PI)+180)%360);
    }
    render();
  }, function(){ alert('Location permission was denied. You can still enter weather manually below.'); });
}
function drawCompass(){
  var w = state.draft.weather;
  var cx=60, cy=60, r=48;
  function pt(deg){ var rad=(deg-90)*Math.PI/180; return [cx+r*Math.cos(rad), cy+r*Math.sin(rad)]; }
  var lines='';
  if(w.windDirDeg!=null){ var p=pt(w.windDirDeg); lines+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0]+'" y2="'+p[1]+'" stroke="#5DA9E0" stroke-width="3" stroke-linecap="round"/><circle cx="'+p[0]+'" cy="'+p[1]+'" r="4" fill="#5DA9E0"/>'; }
  if(w.sunAzimuthDeg!=null){ var p2=pt(w.sunAzimuthDeg); lines+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p2[0]+'" y2="'+p2[1]+'" stroke="#FFD60A" stroke-width="3" stroke-linecap="round"/><circle cx="'+p2[0]+'" cy="'+p2[1]+'" r="4" fill="#FFD60A"/>'; }
  if(state.draft.gpx && state.draft.gpx.bearing!=null){ var p3=pt(state.draft.gpx.bearing); lines+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p3[0]+'" y2="'+p3[1]+'" stroke="#FF6B00" stroke-width="3" stroke-dasharray="4 3" stroke-linecap="round"/>'; }
  return '<svg width="120" height="120" viewBox="0 0 120 120">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(224,225,221,0.25)" stroke-width="1.5"/>'+
    '<text x="60" y="10" fill="#8D93A6" font-size="10" text-anchor="middle">N</text>'+
    '<text x="60" y="116" fill="#8D93A6" font-size="10" text-anchor="middle">S</text>'+
    '<text x="6" y="63" fill="#8D93A6" font-size="10" text-anchor="middle">W</text>'+
    '<text x="114" y="63" fill="#8D93A6" font-size="10" text-anchor="middle">E</text>'+
    lines+'<circle cx="'+cx+'" cy="'+cy+'" r="2.5" fill="#E0E1DD"/></svg>';
}

/* ---------- GPX ---------- */
function parseGPX(text){
  var doc = new DOMParser().parseFromString(text,'application/xml');
  var nodes = Array.from(doc.getElementsByTagName('trkpt'));
  if(nodes.length===0) nodes = Array.from(doc.getElementsByTagName('wpt'));
  var pts = nodes.map(function(n){ return [parseFloat(n.getAttribute('lat')), parseFloat(n.getAttribute('lon'))]; })
    .filter(function(p){ return !isNaN(p[0]) && !isNaN(p[1]); });
  if(pts.length>350){ var step=Math.ceil(pts.length/350); pts = pts.filter(function(_,i){return i%step===0;}); }
  return pts;
}
function bearingBetween(a,b){
  var lat1=a[0]*Math.PI/180, lat2=b[0]*Math.PI/180, dLon=(b[1]-a[1])*Math.PI/180;
  var y=Math.sin(dLon)*Math.cos(lat2);
  var x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
var mapInstance = null;
function renderMap(elId, gpx){
  var el = document.getElementById(elId);
  if(!el) return;
  if(mapInstance){ mapInstance.remove(); mapInstance=null; }
  if(!gpx || !gpx.points || !gpx.points.length) return;
  var map = L.map(el,{zoomControl:false, attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  var line = L.polyline(gpx.points,{color:'#FF6B00',weight:4}).addTo(map);
  map.fitBounds(line.getBounds(),{padding:[18,18]});
  L.circleMarker(gpx.points[0],{radius:6,color:'#FFD60A',fillColor:'#FFD60A',fillOpacity:1}).addTo(map);
  L.circleMarker(gpx.points[gpx.points.length-1],{radius:6,color:'#1B263B',fillColor:'#E0E1DD',fillOpacity:1,weight:2}).addTo(map);
  mapInstance = map;
}

/* ---------- photos ---------- */
function compressImage(file){
  return new Promise(function(resolve){
    var reader = new FileReader();
    reader.onload = function(){
      var img = new Image();
      img.onload = function(){
        var maxW=1000, scale=Math.min(1,maxW/img.width);
        var canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.62));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------- speech recognition ---------- */
function getRecognition(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  var rec = new SR();
  rec.continuous = true; rec.interimResults = true; rec.lang = 'en-GB';
  return rec;
}
function toggleMic(fieldId){
  if(state.recognizingField === fieldId){
    if(state.recognition) state.recognition.stop();
    return;
  }
  if(state.recognition){ state.recognition.onend=null; state.recognition.stop(); }
  var rec = getRecognition();
  if(!rec){ alert('Voice input is not supported in this browser. Try Chrome on Android, or type instead.'); return; }
  var ta = document.getElementById(fieldId);
  var base = ta ? ta.value : '';
  if(base && !/\s$/.test(base)) base += ' ';
  var finalText = '';
  state.recognition = rec;
  state.recognizingField = fieldId;
  refreshMicButtons();
  rec.onresult = function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += t + ' '; else interim += t;
    }
    var el = document.getElementById(fieldId);
    if(el){ el.value = base + finalText + interim; onDraftInput(fieldId, el.value); }
  };
  rec.onerror = function(){ state.recognizingField=null; refreshMicButtons(); };
  rec.onend = function(){ if(state.recognizingField===fieldId){ state.recognizingField=null; refreshMicButtons(); } };
  try{ rec.start(); }catch(e){}
}
function refreshMicButtons(){
  document.querySelectorAll('.mic-btn').forEach(function(b){
    var f = b.getAttribute('data-field');
    b.classList.toggle('rec', state.recognizingField===f);
  });
}
function onDraftInput(field, value){
  var parts = field.split('.');
  var o = state.draft;
  for(var i=0;i<parts.length-1;i++) o = o[parts[i]];
  o[parts[parts.length-1]] = value;
}
window.onDraftInput = onDraftInput;
window.toggleMic = toggleMic;

  else if(state.screen==='trainer') html += '<div class="main">'+screenTrainerQueue()+'</div>';
  else if(state.screen==='edit') html += '<div class="main">'+screenEdit()+'</div>';
  else if(state.screen==='view') html += '<div class="main">'+screenView()+'</div>';
  html += bottomNav();
  document.getElementById('app').innerHTML = html;
  refreshMicButtons();
  if(state.screen==='edit' && state.draft && state.draft.gpx) setTimeout(function(){renderMap('gpxMap', state.draft.gpx);},30);
  if(state.screen==='view' && state.draft && state.draft.gpx) setTimeout(function(){renderMap('gpxMapView', state.draft.gpx);},30);
  if(state.screen==='view') setTimeout(setupSignaturePad,30);
}

function setupSignaturePad(){
  var canvas = document.getElementById('sigCanvas');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.strokeStyle='#E0E1DD'; ctx.lineWidth=2.4; ctx.lineCap='round';
  var drawing=false, last=null;
  function pos(e){
    var rect=canvas.getBoundingClientRect();
    var t = e.touches ? e.touches[0] : e;
    return {x:(t.clientX-rect.left)*(canvas.width/rect.width), y:(t.clientY-rect.top)*(canvas.height/rect.height)};
  }
  function start(e){ drawing=true; last=pos(e); e.preventDefault(); }
  function move(e){ if(!drawing) return; var p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; e.preventDefault(); }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
}

/* ---------- App controller ---------- */
window.App = {
  setRole: function(r){ state.role = r; state.screen='home'; render(); },
  goHome: function(){ state.screen='home'; render(); },
  goTrainerQueue: function(){ state.screen='trainer'; render(); },
  newLogTap: function(){ state.draft = newLog(); state.screen='edit'; render(); },
  openLog: async function(id){
    var log = await loadLog(id);
    if(!log) return;
    state.draft = log;
    state.screen = (state.role==='handler' && log.status==='draft') ? 'edit' : 'view';
    render();
  },
  editCurrentDraft: function(){ state.screen='edit'; render(); },
  setField: function(path, val){ onDraftInput(path, val); render(); },
  setWeatherField: function(key,val){ state.draft.weather[key]=val; render(); },
  fetchWeather: function(){ fetchWeather(); },
  onPhotos: function(e){
    var files = Array.from(e.target.files||[]);
    Promise.all(files.map(compressImage)).then(function(urls){
      urls.forEach(function(u){ state.draft.photos.push({id:uid('p'), dataUrl:u}); });
      render();
    });
  },
  removePhoto: function(id){ state.draft.photos = state.draft.photos.filter(function(p){return p.id!==id;}); render(); },
  onGpx: function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      var pts = parseGPX(reader.result);
      var bearing = pts.length>1 ? bearingBetween(pts[0], pts[Math.min(5,pts.length-1)]) : null;
      state.draft.gpx = { points:pts, name:file.name, bearing: bearing!=null?Math.round(bearing):null };
      render();
    };
    reader.readAsText(file);
  },
  saveDraft: async function(){
    state.draft.status='draft';
    await saveLog(state.draft);
    state.screen='home'; render();
  },
  submitForReview: async function(){
    state.draft.status='submitted';
    await saveLog(state.draft);
    state.screen='home'; render();
  },
  deleteCurrentLog: async function(){
    if(!confirm('Delete this log? This cannot be undone.')) return;
    await removeLog(state.draft.id);
    state.screen='home'; render();
  },
  clearSignature: function(){ var c=document.getElementById('sigCanvas'); if(c) c.getContext('2d').clearRect(0,0,c.width,c.height); },
  shareLog: function(){ if(state.draft) exportLog(state.draft); },
  onImport: function(e){
    var file = e.target.files[0];
    if(file) importLogFile(file);
    e.target.value='';
  },
  signOff: async function(){
    var canvas = document.getElementById('sigCanvas');
    var nameEl = document.getElementById('trainerName');
    var name = nameEl ? nameEl.value.trim() : '';
    if(!name){ alert('Enter the trainer name to confirm sign-off.'); return; }
    var notesEl = document.getElementById('trainerSignoffNotes');
    var toEl = document.getElementById('toReview');
    state.draft.trainerSignoff = {
      name: name,
      signatureDataUrl: canvas.toDataURL('image/png'),
      date: new Date().toISOString(),
      trainingOfficerReview: toEl ? toEl.checked : false,
      notes: notesEl ? notesEl.value : ''
    };
    state.draft.status = 'signed';
    await saveLog(state.draft);
    state.screen='home'; render();
  }
};

/* ---------- boot ---------- */
(async function boot(){
  document.getElementById('app').innerHTML = '<div class="main" style="padding-top:40px;text-align:center;color:var(--neutral-dim);">Loading logs...</div>';
  await loadIndex();
  render();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
})();

})();
</script>
</body>
</html>
